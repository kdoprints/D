<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Track Order | Kota Doria Original</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #f4f7f6; color: #333; margin: 0; padding: 0; }
        header { background-color: #2c3e50; color: white; padding: 2rem 0; text-align: center; }
        .container { max-width: 600px; margin: 2rem auto; padding: 0 1rem; }
        .tracking-box { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); text-align: center; }
        input[type="text"] { width: 100%; padding: 12px; margin: 15px 0; border: 2px solid #ddd; border-radius: 6px; font-size: 16px; box-sizing: border-box; }
        input[type="text"]:focus { border-color: #e67e22; outline: none; }
        button { width: 100%; padding: 12px; background-color: #e67e22; color: white; border: none; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; }
        button:hover { background-color: #d35400; }
        #loader { display: none; margin-top: 20px; color: #8e44ad; font-weight: bold; }
        #result-container { display: none; margin-top: 25px; text-align: left; border-top: 2px solid #eee; padding-top: 20px; }
        .status-badge { display: inline-block; padding: 5px 12px; border-radius: 20px; background-color: #2ecc71; color: white; font-weight: bold; font-size: 0.9rem; margin-bottom: 10px; }
        .scan-event { margin-bottom: 15px; padding: 10px; background-color: #f9f9f9; border-left: 4px solid #e67e22; border-radius: 4px; }
        .error-msg { color: #e74c3c; font-weight: bold; margin-top: 15px; }
    </style>
</head>
<body>

    <header>
        <h1 style="margin:0;">Kota Doria Original</h1>
        <p style="margin:5px 0 0 0;">Wholesale Order Tracking</p>
    </header>

    <div class="container">
        <div class="tracking-box">
            <h2>Track Your Parcel</h2>
            <input type="text" id="awbNumber" placeholder="Enter AWB Number..." autocomplete="off" />
            <button onclick="fetchTrackingData()">Track on Page</button>
            
            <div id="loader">Fetching details... Please wait.</div>
            <div id="error-box" class="error-msg" style="display:none;"></div>
            
            <div id="result-container">
                <div id="status-badge" class="status-badge"></div>
                <p><strong>Expected Delivery:</strong> <span id="delivery-date"></span></p>
                <p><strong>Destination:</strong> <span id="destination"></span></p>
                <h4 style="margin-top: 20px;">Latest Updates:</h4>
                <div id="scans-list"></div>
            </div>
        </div>
    </div>

    <script>
        async function fetchTrackingData() {
            const awb = document.getElementById('awbNumber').value.trim();
            const loader = document.getElementById('loader');
            const resultContainer = document.getElementById('result-container');
            const errorBox = document.getElementById('error-box');
            
            if(awb === "") {
                alert("Please enter a valid AWB number.");
                return;
            }

            errorBox.style.display = 'none';
            resultContainer.style.display = 'none';
            loader.style.display = 'block';

            // Aapka Pipedream Webhook URL yahan lag gaya hai
            const apiUrl = `https://eonv9csx945as56.m.pipedream.net?awb=${awb}`;

            try {
                const response = await fetch(apiUrl);
                if (!response.ok) throw new Error("Network response was not ok");
                
                const data = await response.json();
                
                if (data.ShipmentData && data.ShipmentData.length > 0) {
                    const shipment = data.ShipmentData[0].Shipment;
                    
                    document.getElementById('status-badge').innerText = shipment.Status.Status;
                    document.getElementById('delivery-date').innerText = shipment.ExpectedDeliveryDate || 'Processing...';
                    document.getElementById('destination').innerText = shipment.Destination;
                    
                    let scansHtml = "";
                    shipment.Scans.forEach(scanItem => {
                        const scan = scanItem.ScanDetail;
                        scansHtml += `
                            <div class="scan-event">
                                <div style="font-size:0.85rem; color:#666;">${scan.ScanDateTime}</div>
                                <div><strong>${scan.Instructions}</strong></div>
                                <div style="font-size:0.9rem;">Location: ${scan.ScannedLocation}</div>
                            </div>
                        `;
                    });
                    
                    document.getElementById('scans-list').innerHTML = scansHtml;
                    loader.style.display = 'none';
                    resultContainer.style.display = 'block';
                } else {
                    throw new Error("No tracking data found for this AWB.");
                }
            } catch (error) {
                loader.style.display = 'none';
                errorBox.innerText = "Error: Could not fetch details. Please check the AWB or try again later.";
                errorBox.style.display = 'block';
            }
        }
    </script>

</body>
</html>
