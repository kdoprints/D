<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Track Your Order | Kota Doria Original</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f7f6;
            color: #333;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        header {
            background-color: #8e44ad; /* Royal ethnic purple */
            color: white;
            padding: 2rem 0;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        header h1 {
            margin: 0;
            font-size: 2.2rem;
            letter-spacing: 1px;
        }
        header p {
            margin: 10px 0 0 0;
            font-size: 1.1rem;
            opacity: 0.9;
        }
        .container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
        }
        .tracking-box {
            background: white;
            padding: 3rem 2rem;
            border-radius: 10px;
            box-shadow: 0 8px 15px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 450px;
            text-align: center;
        }
        .tracking-box h2 {
            margin-top: 0;
            color: #2c3e50;
            margin-bottom: 20px;
        }
        input[type="text"] {
            width: 100%;
            padding: 15px;
            margin-bottom: 20px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            box-sizing: border-box;
            transition: border-color 0.3s;
        }
        input[type="text"]:focus {
            border-color: #8e44ad;
            outline: none;
        }
        button {
            width: 100%;
            padding: 15px;
            background-color: #e67e22; /* Warm accent color */
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #d35400;
        }
        footer {
            background-color: #2c3e50;
            color: #bdc3c7;
            text-align: center;
            padding: 20px;
            font-size: 0.9rem;
            line-height: 1.6;
        }
        .contact-info {
            margin-top: 10px;
            font-weight: bold;
            color: #fff;
        }
    </style>
</head>
<body>

    <header>
        <h1>Kota Doria Original</h1>
        <p>Premium Dress Materials & Fabrics</p>
    </header>

    <div class="container">
        <div class="tracking-box">
            <h2>Track Your Parcel</h2>
            <p style="color: #666; margin-bottom: 25px;">Enter your Delhivery AWB number below to check your shipment status.</p>
            
            <input type="text" id="awbNumber" placeholder="Enter AWB Number..." autocomplete="off" />
            <button onclick="trackNow()">Track Order</button>
        </div>
    </div>

    <footer>
        <div>Sanjay Nagar, Badi Bhimpura, Kaithun, Kota, Rajasthan – 325001</div>
        <div class="contact-info">WhatsApp / Support: +91 9664498112</div>
        <div style="margin-top: 15px;">&copy; 2026 Kota Doria Original. All rights reserved.</div>
    </footer>

    <script>
        function trackNow() {
            var awb = document.getElementById('awbNumber').value.trim();
            if(awb === "") {
                alert("Please enter a valid AWB number.");
                return;
            }
            // Redirects user securely to the official tracking page with their AWB filled in
            var trackingUrl = "https://www.delhivery.com/track/package/" + awb;
            window.open(trackingUrl, '_blank');
        }

        // Allow pressing "Enter" key to track
        document.getElementById("awbNumber").addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                event.preventDefault();
                trackNow();
            }
        });
    </script>

</body>
</html>
